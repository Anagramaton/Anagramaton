name: Generate Unlimited Boards

on:
  schedule:
    - cron: '10 5 * * *'   # 05:10 UTC daily — 10 min after daily-board.yml
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of boards to generate'
        required: false
        default: '10'
      keep_days:
        description: 'Days to keep in rolling pool'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Generate unlimited boards
        run: |
          COUNT="${{ github.event.inputs.count || '10' }}"
          KEEP="${{ github.event.inputs.keep_days || '30' }}"
          node scripts/generateUnlimitedBoards.mjs --count=$COUNT --keep-days=$KEEP
      - name: Commit and push boards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boards/unlimited/
          if git diff --quiet --cached; then
            echo "No new boards — skipping commit."
          else
            BOARD_COUNT=$(git diff --cached --name-only | grep '\.json$' | grep -v manifest | wc -l | tr -d ' ')
            git commit -m "chore: add ${BOARD_COUNT} unlimited boards $(date -u +'%Y-%m-%d')"
            git push origin main
          fi
