name: Generate Daily Board

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 12:00am EST (UTC-5); fixed offset, not DST-adjusted
  workflow_dispatch:        # allow manual runs for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate daily board
        run: npm run generate

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuiltBoards.json
          if git diff --quiet --cached; then
            echo "No changes to prebuiltBoards.json — skipping commit."
          else
            git commit -m "chore: generate daily board $(date -u +'%Y-%m-%d')"
            git push origin main
          fi
